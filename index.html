<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="icon" href="favicon.ico" type="image/x-icon" />

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Instrument+Serif:ital@0;1&family=Inter:wght@300..600&family=Space+Grotesk:wght@300..600&family=JetBrains+Mono:wght@300..500&family=EB+Garamond:ital,wght@0,400..600;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Lora:ital,wght@0,400..600;1,400..600&family=Playfair+Display:ital,wght@0,400..600;1,400..600&family=Spectral:ital,wght@0,300..600;1,300..600&family=DM+Sans:opsz,wght@9..40,300..600&family=Work+Sans:ital,wght@0,300..600;1,300..600&family=Manrope:wght@300..600&family=IBM+Plex+Mono:ital,wght@0,300..500;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" />
<script>
  try {
    var t = localStorage.getItem("theme");
    if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
      document.documentElement.classList.add("dark");
    }
  } catch (e) {}
</script>
<style>
  :root {
    --background: oklch(0.965 0.012 85);
    --foreground: oklch(0.28 0.02 70);
    --muted-foreground: oklch(0.52 0.02 75);
    --border: oklch(0.88 0.015 85);
  }
  html.dark {
    --background: oklch(0.22 0.012 70);
    --foreground: oklch(0.9 0.018 85);
    --muted-foreground: oklch(0.65 0.02 80);
    --border: oklch(0.32 0.014 70);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background-color: var(--background);
    color: var(--foreground);
    font-family: var(--font, "Newsreader", Georgia, serif);
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  /* font-preview switcher (dev only) */
  #switcher {
    position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 0.5rem; font-family: "Inter", sans-serif;
    background: var(--background); border: 1px solid var(--border);
    border-radius: 9999px; padding: 0.35rem 0.5rem 0.35rem 0.9rem;
    font-size: 0.8rem; color: var(--muted-foreground); box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  #switcher button {
    background: none; border: 1px solid var(--border); border-radius: 9999px;
    font-family: inherit; font-size: 0.8rem; color: var(--muted-foreground);
    cursor: pointer; padding: 0.15rem 0.6rem; transition: color 0.15s, border-color 0.15s;
  }
  #switcher button:hover { color: var(--foreground); border-color: var(--foreground); }
  #switcher .name { color: var(--foreground); min-width: 9.5rem; text-align: center; }
  main {
    max-width: 32rem;
    margin: 0 auto;
    padding: 6rem 1.5rem;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .id { display: flex; align-items: center; gap: 0.75rem; }
  .id img {
    height: 2.25rem;
    width: 2.25rem;
    border-radius: 9999px;
    object-fit: cover;
    filter: grayscale(1);
  }
  .id h1 { font-size: 1.125rem; font-weight: 400; margin: 0; }
  #theme-toggle {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.875rem;
    color: var(--muted-foreground);
    cursor: pointer;
    transition: color 0.2s ease;
  }
  #theme-toggle:hover { color: var(--foreground); }
  section { margin-top: 3.5rem; }
  .intro { font-size: 1.05rem; line-height: 1.75; }
  .intro p { margin: 0 0 1.25rem 0; }
  .intro p:last-child { margin-bottom: 0; }
  .muted { color: var(--muted-foreground); }
  .label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted-foreground);
    margin: 0;
  }
  .label-body { margin-top: 0.75rem; line-height: 1.6; }
  ul { list-style: none; margin: 0.75rem 0 0 0; padding: 0; }
  li { margin: 0 0 0.4rem 0; }
  a.link-quiet {
    color: var(--muted-foreground);
    text-decoration: underline;
    text-decoration-color: color-mix(in oklab, var(--muted-foreground) 35%, transparent);
    text-underline-offset: 3px;
    transition: color 0.2s ease, text-decoration-color 0.2s ease;
  }
  a.link-quiet:hover { color: var(--foreground); text-decoration-color: var(--foreground); }

  .links-icons { list-style: none; margin: 0.75rem 0 0 0; padding: 0; }
  .links-icons li { display: flex; align-items: center; gap: 0.65rem; margin: 0 0 0.55rem 0; }
  .links-icons svg { width: 1rem; height: 1rem; stroke: var(--muted-foreground); flex: none; }
</style>
</head>
<body>
<main>
  <header>
    <div class="id">
      <img src="pfp.png" alt="Douglas Chen" />
      <h1>Douglas Chen</h1>
    </div>
    <button id="theme-toggle" aria-label="Toggle dark mode">☀ / ☾</button>
  </header>

  <section class="intro">
    <p>Hi, I'm Doug(las). I like solving problems and living for the plot.</p>
  </section>

  <section>
    <p class="label">Now</p>
    <p class="label-body">
      Interning at
      <a href="https://www.nimblerx.com" target="_blank" rel="noreferrer" class="link-quiet">NimbleRx</a>
      <span class="muted">(YC W15)</span>.
      Building the context harness and AI agents to automate customer triage.
    </p>
  </section>

  <section>
    <p class="label">Elsewhere</p>
    <ul class="links-icons">
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg>
        <a href="mailto:douglas@ichen.ca" class="link-quiet">douglas@ichen.ca</a>
      </li>
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.9a3.4 3.4 0 0 0-.9-2.6c3-.3 6.2-1.5 6.2-6.7A5.2 5.2 0 0 0 20 4.8a4.9 4.9 0 0 0-.1-3.6s-1.1-.3-3.6 1.4a12.3 12.3 0 0 0-6.6 0C7.2.9 6.1 1.2 6.1 1.2A4.9 4.9 0 0 0 6 4.8 5.2 5.2 0 0 0 4.6 8.4c0 5.2 3.2 6.4 6.2 6.7a3.4 3.4 0 0 0-.9 2.6V22"/></svg>
        <a href="https://www.github.com/douglasichen" target="_blank" rel="noreferrer" class="link-quiet">github</a>
      </li>
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        <a href="https://www.linkedin.com/in/douglasichen/" target="_blank" rel="noreferrer" class="link-quiet">linkedin</a>
      </li>
      <li>
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h8M8 9h2"/></svg>
        <a href="resume.pdf" class="link-quiet">resume</a>
      </li>
    </ul>
  </section>
</main>

<div id="switcher">
  <span>font:</span>
  <button id="f-prev" aria-label="Previous font">‹</button>
  <span class="name" id="f-name">Newsreader</span>
  <button id="f-next" aria-label="Next font">›</button>
</div>

<script>
  document.getElementById("theme-toggle").addEventListener("click", function () {
    var isDark = document.documentElement.classList.toggle("dark");
    try { localStorage.setItem("theme", isDark ? "dark" : "light"); } catch (e) {}
  });

  // Font preview switcher (remove once a font is chosen)
  var FONTS = [
    { name: "Newsreader", stack: '"Newsreader", Georgia, serif' },
    { name: "Instrument Serif", stack: '"Instrument Serif", Georgia, serif' },
    { name: "EB Garamond", stack: '"EB Garamond", Georgia, serif' },
    { name: "Fraunces", stack: '"Fraunces", Georgia, serif' },
    { name: "Lora", stack: '"Lora", Georgia, serif' },
    { name: "Playfair Display", stack: '"Playfair Display", Georgia, serif' },
    { name: "Spectral", stack: '"Spectral", Georgia, serif' },
    { name: "Inter", stack: '"Inter", system-ui, sans-serif' },
    { name: "DM Sans", stack: '"DM Sans", system-ui, sans-serif' },
    { name: "Work Sans", stack: '"Work Sans", system-ui, sans-serif' },
    { name: "Manrope", stack: '"Manrope", system-ui, sans-serif' },
    { name: "Space Grotesk", stack: '"Space Grotesk", system-ui, sans-serif' },
    { name: "JetBrains Mono", stack: '"JetBrains Mono", ui-monospace, monospace' },
    { name: "IBM Plex Mono", stack: '"IBM Plex Mono", ui-monospace, monospace' },
    { name: "Space Mono", stack: '"Space Mono", ui-monospace, monospace' },
  ];
  var fi = 0;
  function showFont() {
    document.body.style.setProperty("--font", FONTS[fi].stack);
    document.getElementById("f-name").textContent = FONTS[fi].name;
  }
  document.getElementById("f-prev").addEventListener("click", function () {
    fi = (fi - 1 + FONTS.length) % FONTS.length; showFont();
  });
  document.getElementById("f-next").addEventListener("click", function () {
    fi = (fi + 1) % FONTS.length; showFont();
  });
</script>
</body>
</html>
